name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Version din tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build dashboard (React -> wwwroot)
        working-directory: src/dashboard
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Build extensia MV3
        working-directory: src/extension
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Teste
        run: dotnet test src/Tracker.Tests -c Release

      - name: Publish componentele (framework-dependent, win-x64)
        shell: pwsh
        run: |
          foreach ($proj in @("Tracker.Watcher", "Tracker.Daemon", "Tracker.Supervisor")) {
            dotnet publish "src/$proj" -c Release -r win-x64 --self-contained false `
              -o "installer/staging/bin/$proj"
            if ($LASTEXITCODE -ne 0) { throw "publish failed: $proj" }
          }
          Copy-Item -Recurse src/extension/dist installer/staging/extension
          New-Item -ItemType Directory -Force installer/staging/config | Out-Null
          Copy-Item config/tracker.toml installer/staging/config/

      - name: Instalator (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ steps.ver.outputs.version }} installer/minutar.iss

      - name: Zip portabil
        shell: pwsh
        run: |
          Copy-Item scripts/uninstall.ps1 installer/staging/
          Compress-Archive -Path installer/staging/* `
            -DestinationPath "installer/Output/Minutar-portable-${{ steps.ver.outputs.version }}.zip"

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/Minutar-Setup-${{ steps.ver.outputs.version }}.exe
            installer/Output/Minutar-portable-${{ steps.ver.outputs.version }}.zip
          generate_release_notes: true
